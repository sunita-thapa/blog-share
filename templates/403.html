{# 403.html #}
{% extends 'base.html' %}
{% block title %}Access Forbidden{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:3rem 1rem;">
  <div>
    <div style="font-size:5rem;margin-bottom:1rem;">🚫</div>
    <h1 style="font-family:var(--font-head);font-size:4rem;color:var(--crimson);margin:0;">403</h1>
    <h2 style="font-family:var(--font-head);margin:.5rem 0;">Access Forbidden</h2>
    <p class="text-muted" style="max-width:400px;margin:.5rem auto 2rem;">
      You don't have permission to access this page. This content belongs to someone else.
    </p>
    <div class="d-flex gap-3 justify-content-center">
      <a href="{{ url_for('home') }}" class="btn-sky btn">Go Home</a>
      <a href="{{ url_for('dashboard') }}" class="btn-outline-sky btn">My Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
