{# 404.html #}
{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:3rem 1rem;">
  <div>
    <div style="font-size:5rem;margin-bottom:1rem;">🔍</div>
    <h1 style="font-family:var(--font-head);font-size:4rem;color:var(--sky);margin:0;">404</h1>
    <h2 style="font-family:var(--font-head);margin:.5rem 0;">Page Not Found</h2>
    <p class="text-muted" style="max-width:400px;margin:.5rem auto 2rem;">
      Sorry, the page you're looking for doesn't exist or has been moved.
    </p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="{{ url_for('home') }}" class="btn-sky btn">Go Home</a>
      <a href="{{ url_for('blog') }}" class="btn-outline-sky btn">Browse Blog</a>
    </div>
  </div>
</div>
{% endblock %}
