{# project_form.html #}
{% extends 'base.html' %}
{% block title %}{{ action }} Project{% endblock %}
{% block content %}
<div class="d-flex">
  <aside class="dashboard-sidebar d-none d-lg-block">
    <div class="sidebar-section-label">Navigation</div>
    <a href="{{ url_for('dashboard') }}" class="sidebar-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a href="{{ url_for('new_project') }}" class="sidebar-link active"><i class="fa-solid fa-folder-plus"></i> New Project</a>
  </aside>
  <main class="dashboard-main flex-grow-1">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{{ url_for('dashboard') }}" class="btn-outline-sky btn btn-sm"><i class="fa-solid fa-arrow-left"></i></a>
      <h2 style="font-family:var(--font-head); margin:0; font-size:1.6rem;">{{ action }} Project</h2>
    </div>

    <div class="form-card" style="max-width:680px;">
      <form method="POST" class="needs-validation" novalidate>
        <div class="mb-3">
          <label class="form-label">Project Title *</label>
          <input type="text" class="form-control" name="title" required placeholder="My Awesome Project"
                 value="{{ project.title if project else '' }}" />
        </div>
        <div class="mb-3">
          <label class="form-label">Description *</label>
          <textarea class="form-control" name="description" rows="4" required
                    placeholder="What does this project do? What problem does it solve?">{{ project.description if project else '' }}</textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Tech Stack</label>
          <input type="text" class="form-control" name="tech_stack" placeholder="Python, Flask, Bootstrap, SQLite"
                 value="{{ project.tech_stack if project else '' }}" />
          <small class="text-muted">Comma-separated list of technologies used</small>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">GitHub URL</label>
            <input type="url" class="form-control" name="github_url" placeholder="https://github.com/you/repo"
                   value="{{ project.github_url if project else '' }}" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Live URL</label>
            <input type="url" class="form-control" name="live_url" placeholder="https://yourproject.com"
                   value="{{ project.live_url if project else '' }}" />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Project Image URL</label>
          <input type="url" class="form-control" name="image_url" placeholder="https://example.com/screenshot.png"
                 value="{{ project.image_url if project else '' }}" />
        </div>
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="is_featured" name="is_featured"
                 {% if project and project.is_featured %}checked{% endif %} />
          <label class="form-check-label" for="is_featured">⭐ Mark as featured project</label>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn-crimson btn"><i class="fa-solid fa-floppy-disk me-1"></i> Save Project</button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
{% endblock %}
