{# tech_form.html #}
{% extends 'base.html' %}
{% block title %}{{ action }} Technology{% endblock %}
{% block content %}
<div class="d-flex">
  <aside class="dashboard-sidebar d-none d-lg-block">
    <div class="sidebar-section-label">Navigation</div>
    <a href="{{ url_for('dashboard') }}" class="sidebar-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a href="{{ url_for('new_technology') }}" class="sidebar-link active"><i class="fa-solid fa-microchip"></i> Add Technology</a>
  </aside>
  <main class="dashboard-main flex-grow-1">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{{ url_for('dashboard') }}" class="btn-outline-sky btn btn-sm"><i class="fa-solid fa-arrow-left"></i></a>
      <h2 style="font-family:var(--font-head); margin:0; font-size:1.6rem;">{{ action }} Technology</h2>
    </div>

    <div class="form-card" style="max-width:520px;">
      <form method="POST" class="needs-validation" novalidate>

        <div class="mb-3">
          <label class="form-label">Technology Name *</label>
          <input type="text" class="form-control" name="name" required
                 placeholder="e.g. Docker, PostgreSQL, VS Code"
                 value="{{ tech.name if tech else '' }}" />
        </div>

        <div class="mb-3">
          <label class="form-label">Category</label>
          <select class="form-select" name="category">
            {% for cat in ['Tool','Database','Cloud','DevOps','Framework','Language','Editor','Version Control','Other'] %}
              <option value="{{ cat }}" {% if tech and tech.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Short Description</label>
          <input type="text" class="form-control" name="description"
                 placeholder="e.g. Containerisation platform"
                 value="{{ tech.description if tech else '' }}" />
        </div>

        <div class="mb-4">
          <label class="form-label">Badge Colour</label>
          <div class="d-flex align-items-center gap-3">
            <input type="color" class="form-control form-control-color" id="badge_color" name="badge_color"
                   value="{{ tech.badge_color if tech else '#0ea5e9' }}"
                   style="width:60px; height:38px; padding:2px; border-radius:.5rem;" />
            <div id="colorSwatch"
                 style="width:120px; height:38px; border-radius:.5rem; background:{{ tech.badge_color if tech else '#0ea5e9' }};"></div>
            <span class="text-muted small">Badge preview</span>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn-crimson btn"><i class="fa-solid fa-floppy-disk me-1"></i> Save Technology</button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-light">Cancel</a>
        </div>

      </form>
    </div>
  </main>
</div>
{% endblock %}
