{# skill_form.html #}
{% extends 'base.html' %}
{% block title %}{{ action }} Skill{% endblock %}
{% block content %}
<div class="d-flex">
  <aside class="dashboard-sidebar d-none d-lg-block">
    <div class="sidebar-section-label">Navigation</div>
    <a href="{{ url_for('dashboard') }}" class="sidebar-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a href="{{ url_for('new_skill') }}" class="sidebar-link active"><i class="fa-solid fa-star"></i> Add Skill</a>
  </aside>
  <main class="dashboard-main flex-grow-1">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{{ url_for('dashboard') }}" class="btn-outline-sky btn btn-sm"><i class="fa-solid fa-arrow-left"></i></a>
      <h2 style="font-family:var(--font-head); margin:0; font-size:1.6rem;">{{ action }} Skill</h2>
    </div>

    <div class="form-card" style="max-width:520px;">
      <form method="POST" class="needs-validation" novalidate>

        <div class="mb-3">
          <label class="form-label">Skill Name *</label>
          <input type="text" class="form-control" name="name" required
                 placeholder="e.g. Python, Photoshop, Public Speaking"
                 value="{{ skill.name if skill else '' }}" />
        </div>

        <div class="mb-3">
          <label class="form-label">Category</label>
          <select class="form-select" name="category">
            {% for cat in ['Frontend','Backend','Database','DevOps','Design','Mobile','Data Science','General'] %}
              <option value="{{ cat }}" {% if skill and skill.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label">
            Proficiency: <strong id="profVal">{{ skill.proficiency if skill else 75 }}%</strong>
          </label>
          <input type="range" class="form-range" name="proficiency" id="proficiency"
                 min="10" max="100" step="5"
                 value="{{ skill.proficiency if skill else 75 }}"
                 oninput="document.getElementById('profVal').textContent = this.value + '%'" />
          <div style="background:var(--border); border-radius:2rem; height:8px; overflow:hidden; margin-top:.5rem;">
            <div id="profBar" style="height:100%; border-radius:2rem; background:linear-gradient(90deg,var(--sky),var(--crimson)); transition:width .2s; width:{{ skill.proficiency if skill else 75 }}%;"></div>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn-sky btn"><i class="fa-solid fa-floppy-disk me-1"></i> Save Skill</button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-light">Cancel</a>
        </div>

      </form>
    </div>
  </main>
</div>
{% endblock %}

{% block extra_js %}
<script>
const profInput = document.getElementById('proficiency');
const profBar   = document.getElementById('profBar');
profInput.addEventListener('input', function() {
  profBar.style.width = this.value + '%';
});
</script>
{% endblock %}
